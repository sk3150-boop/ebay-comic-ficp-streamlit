services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: comic_ficp
      POSTGRES_USER: comic_ficp
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - comic_ficp_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U comic_ficp -d comic_ficp"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 8501
      COMIC_FICP_PUBLIC_MODE: "1"
      COMIC_FICP_DATABASE_URL: postgresql://comic_ficp:${POSTGRES_PASSWORD}@db:5432/comic_ficp
      COMIC_FICP_KEY_ENCRYPTION_SECRET: ${COMIC_FICP_KEY_ENCRYPTION_SECRET:?COMIC_FICP_KEY_ENCRYPTION_SECRET is required}
    ports:
      - "${COMIC_FICP_PUBLIC_PORT:-8501}:8501"

volumes:
  comic_ficp_db:

