services:
  - type: web
    name: comic-ficp-streamlit
    env: docker
    plan: starter
    autoDeploy: false
    envVars:
      - key: COMIC_FICP_PUBLIC_MODE
        value: "1"
      - key: COMIC_FICP_DATABASE_URL
        fromDatabase:
          name: comic-ficp-db
          property: connectionString
      - key: COMIC_FICP_KEY_ENCRYPTION_SECRET
        generateValue: true

databases:
  - name: comic-ficp-db
    plan: starter
